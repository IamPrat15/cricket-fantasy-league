services:
  - type: web
    name: thunder-xi-fantasy
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: DEADLINE
        value: 2026-03-28T14:00:00.000Z
      - key: TURSO_DB_URL
        sync: false
      - key: TURSO_DB_TOKEN
        sync: false
